<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Better DeepSeek Site Access</title>
    <style>
      :root {
        color-scheme: light;
        --bds-permission-bg: #f5f7fb;
        --bds-permission-surface: #ffffff;
        --bds-permission-border: #000000;
        --bds-permission-text: #000000;
        --bds-permission-muted: #475569;
        --bds-permission-accent: #1e3a8a;
        --bds-permission-shadow: 4px 4px 0 #000000;
        font-family:
          "Inter",
          "Segoe UI",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: var(--bds-permission-bg);
        color: var(--bds-permission-text);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
          linear-gradient(180deg, rgba(30, 58, 138, 0.08) 0, rgba(30, 58, 138, 0.08) 96px, transparent 96px),
          var(--bds-permission-bg);
      }

      .bds-card {
        width: min(100%, 460px);
        padding: 28px;
        border-radius: 0;
        background: var(--bds-permission-surface);
        border: 2px solid var(--bds-permission-border);
        box-shadow: var(--bds-permission-shadow);
      }

      .bds-eyebrow {
        margin: 0 0 8px;
        color: var(--bds-permission-accent);
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
        line-height: 1.05;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: var(--bds-permission-text);
      }

      .bds-origin {
        margin-top: 16px;
        display: inline-flex;
        max-width: 100%;
        padding: 8px 12px;
        border-radius: 0;
        background: var(--bds-permission-bg);
        border: 2px solid var(--bds-permission-border);
        color: var(--bds-permission-accent);
        font-size: 12px;
        font-weight: 800;
        word-break: break-all;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      .bds-status {
        margin-top: 18px;
        min-height: 22px;
        font-size: 13px;
        color: var(--bds-permission-muted);
      }

      .bds-status[data-state="error"] {
        color: #991b1b;
      }

      .bds-status[data-state="success"] {
        color: #166534;
      }

      .bds-note {
        margin-top: 18px;
        padding: 14px;
        border: 2px solid var(--bds-permission-border);
        background: var(--bds-permission-bg);
        box-shadow: var(--bds-permission-shadow);
      }

      .bds-note-title {
        margin: 0 0 8px;
        color: var(--bds-permission-accent);
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .bds-note-copy {
        font-size: 12px;
        line-height: 1.55;
      }

      .bds-actions {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        margin-top: 24px;
      }

      .bds-btn {
        appearance: none;
        border: 2px solid var(--bds-permission-border);
        border-radius: 0;
        padding: 11px 16px;
        font-size: 12px;
        font-weight: 900;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        box-shadow: var(--bds-permission-shadow);
      }

      .bds-btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        box-shadow: none;
      }

      .bds-btn-secondary {
        background: var(--bds-permission-surface);
        color: var(--bds-permission-text);
      }

      .bds-btn-primary {
        background: var(--bds-permission-accent);
        color: #ffffff;
      }

      .bds-hint {
        margin-top: 18px;
        font-size: 12px;
        color: var(--bds-permission-muted);
      }
    </style>
  </head>
  <body>
    <main class="bds-card">
      <p class="bds-eyebrow">Better DeepSeek</p>
      <h1>Allow site access</h1>
      <p id="bds-copy">
        Grant Better DeepSeek access to this site so Web Fetch can read the page
        and attach it to the chat.
      </p>
      <div id="bds-origin" class="bds-origin"></div>
      <div id="bds-status" class="bds-status" aria-live="polite"></div>
      <div class="bds-actions">
        <button id="bds-cancel" class="bds-btn bds-btn-secondary" type="button">
          Cancel
        </button>
        <button id="bds-allow" class="bds-btn bds-btn-primary" type="button">
          Allow access
        </button>
      </div>
      <div class="bds-note">
        <p class="bds-note-title">Blanket access</p>
        <p id="bds-note-copy" class="bds-note-copy"></p>
      </div>
      <p class="bds-hint">
        This only grants Better DeepSeek access to the current site. The chat
        tab will continue automatically after access is granted.
      </p>
    </main>
    <script src="./web-fetch-permission.js"></script>
  </body>
</html>
