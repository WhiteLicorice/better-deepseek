<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Better DeepSeek Site Access</title>
    <style>
      :root {
        color-scheme: dark;
        --bds-bg-panel: #1e1f23;
        --bds-bg-elevated: #2a2b30;
        --bds-bg-hover: rgba(255, 255, 255, 0.08);
        --bds-bg-input: #2a2b30;
        --bds-border: #3a3b3f;
        --bds-border-hover: #4a4b50;
        --bds-text-primary: #ececec;
        --bds-text-secondary: #8e8ea0;
        --bds-text-tertiary: #6b6b7b;
        --bds-accent: #5b7bff;
        --bds-accent-glow: rgba(91, 123, 255, 0.15);
        --bds-danger: #f87171;
        --bds-danger-border: rgba(248, 113, 113, 0.35);
        --bds-radius: 14px;
        --bds-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), 0 4px 12px rgba(0, 0, 0, 0.25);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: transparent;
        color: var(--bds-text-primary);
        -webkit-font-smoothing: antialiased;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(0, 0, 0, 0.45);
      }

      .bds-card {
        width: min(100%, 460px);
        padding: 28px;
        border-radius: var(--bds-radius);
        background: var(--bds-bg-panel);
        border: 1px solid var(--bds-border);
        box-shadow: var(--bds-shadow);
      }

      .bds-eyebrow {
        margin: 0 0 4px;
        color: var(--bds-text-tertiary);
        font-size: 12px;
        font-weight: 600;
      }

      h1 {
        margin: 0 0 14px;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.3px;
        color: var(--bds-text-primary);
      }

      p {
        margin: 0;
        line-height: 1.55;
        color: var(--bds-text-primary);
        font-size: 14px;
      }

      .bds-origin {
        margin-top: 16px;
        display: inline-flex;
        max-width: 100%;
        padding: 8px 12px;
        border-radius: 8px;
        background: var(--bds-bg-elevated);
        border: 1px solid var(--bds-border);
        color: var(--bds-accent);
        font-size: 12px;
        font-weight: 600;
        word-break: break-all;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      .bds-status {
        margin-top: 18px;
        min-height: 22px;
        font-size: 13px;
        color: var(--bds-text-secondary);
      }

      .bds-status[data-state="error"] {
        color: var(--bds-danger);
      }

      .bds-status[data-state="success"] {
        color: #4ade80;
      }

      .bds-note {
        margin-top: 18px;
        padding: 14px;
        border: 1px solid var(--bds-border);
        border-radius: 10px;
        background: var(--bds-bg-elevated);
      }

      .bds-note-title {
        margin: 0 0 8px;
        color: var(--bds-text-tertiary);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }

      .bds-note-copy {
        font-size: 12px;
        line-height: 1.55;
        color: var(--bds-text-secondary);
      }

      .bds-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 24px;
      }

      .bds-btn {
        appearance: none;
        border-radius: 10px;
        padding: 9px 18px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.18s ease;
      }

      .bds-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .bds-btn-secondary {
        border: 1px solid var(--bds-border);
        background: transparent;
        color: var(--bds-text-primary);
      }

      .bds-btn-secondary:hover:not(:disabled) {
        background: var(--bds-bg-hover);
        border-color: var(--bds-border-hover);
      }

      .bds-btn-primary {
        border: none;
        background: var(--bds-accent);
        color: #ffffff;
      }

      .bds-btn-primary:hover:not(:disabled) {
        opacity: 0.88;
      }

      .bds-btn-primary:active:not(:disabled) {
        transform: scale(0.98);
      }

      .bds-hint {
        margin-top: 16px;
        font-size: 12px;
        color: var(--bds-text-secondary);
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="bds-card">
      <p class="bds-eyebrow">Better DeepSeek</p>
      <h1>Allow site access</h1>
      <p id="bds-copy">
        Grant Better DeepSeek access to this site so Web Fetch can read the page
        and attach it to the chat.
      </p>
      <div id="bds-origin" class="bds-origin"></div>
      <div id="bds-status" class="bds-status" aria-live="polite"></div>
      <div class="bds-actions">
        <button id="bds-cancel" class="bds-btn bds-btn-secondary" type="button">
          Cancel
        </button>
        <button id="bds-allow" class="bds-btn bds-btn-primary" type="button">
          Allow access
        </button>
      </div>
      <div class="bds-note">
        <p class="bds-note-title">Blanket access</p>
        <p id="bds-note-copy" class="bds-note-copy"></p>
      </div>
      <p class="bds-hint">
        This only grants Better DeepSeek access to the current site. The chat
        tab will continue automatically after access is granted.
      </p>
    </main>
    <script src="./web-fetch-permission.js"></script>
  </body>
</html>
