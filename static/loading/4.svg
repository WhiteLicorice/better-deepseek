<svg width="200" height="100" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Whale bobbing and swimming animation */
    @keyframes bob {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-4px) rotate(-1deg); }
    }

    /* Tail wiggle animation */
    @keyframes wag {
      0%, 100% { transform: rotate(-8deg); }
      50% { transform: rotate(8deg); }
    }

    /* Flipper flapping animation */
    @keyframes flap {
      0%, 100% { transform: rotate(-5deg); }
      50% { transform: rotate(5deg); }
    }

    /* Sonar wave pulse animation */
    @keyframes sonar-pulse {
      0% {
        opacity: 0;
        transform: scale(0.7) translateX(-5px);
      }
      25% {
        opacity: 0.8;
      }
      75% {
        opacity: 0.8;
      }
      100% {
        opacity: 0;
        transform: scale(1.3) translateX(15px);
      }
    }

    .whale-body-group {
      animation: bob 3s ease-in-out infinite;
      transform-origin: 95px 60px;
    }

    .whale-tail {
      animation: wag 1.5s ease-in-out infinite;
      transform-origin: 30px 50px;
    }

    .whale-flipper {
      animation: flap 2s ease-in-out infinite;
      transform-origin: 95px 61px;
    }

    .sonar-wave {
      fill: none;
      stroke: white;
      stroke-width: 1.8;
      stroke-linecap: round;
      opacity: 0;
      transform-origin: 160px 60px;
    }

    .sonar-1 {
      animation: sonar-pulse 2.1s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    .sonar-2 {
      animation: sonar-pulse 2.1s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      animation-delay: 0.7s;
    }

    .sonar-3 {
      animation: sonar-pulse 2.1s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      animation-delay: 1.4s;
    }

    .whale-outline {
      fill: none;
      stroke: white;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .whale-accent {
      fill: none;
      stroke: white;
      stroke-width: 1.2;
      stroke-linecap: round;
      opacity: 0.5;
    }
  </style>

  <!-- Main Animated Group -->
  <g class="whale-body-group">
    <!-- Sonar Waves (placed inside so they bob along with the whale) -->
    <g class="sonar-group">
      <path class="sonar-wave sonar-1" d="M 168,52 Q 176,60 168,68" />
      <path class="sonar-wave sonar-2" d="M 176,46 Q 188,60 176,74" />
      <path class="sonar-wave sonar-3" d="M 184,40 Q 200,60 184,80" />
    </g>

    <!-- Dorsal Fin -->
    <path class="whale-outline" d="M 95,31 C 100,23 105,23 108,30" />
    
    <!-- Main Body and Snout -->
    <path class="whale-outline" d="M 30,50 C 55,30 115,25 155,45 C 162,49 162,71 155,75 C 115,95 55,70 30,50 Z" />
    
    <!-- Ventral lines / Accents (creates a premium wireframe style) -->
    <path class="whale-accent" d="M 50,54 C 70,44 110,42 140,55" />
    <path class="whale-accent" d="M 45,58 C 65,66 105,68 135,63" />

    <!-- Flipper -->
    <path class="whale-flipper whale-outline" d="M 95,61 C 98,75 90,82 82,78 C 78,74 86,65 95,61 Z" />

    <!-- Tail -->
    <g class="whale-tail">
      <path class="whale-outline" d="M 30,50 C 22,40 12,38 8,42 C 12,47 22,49 30,50 C 22,51 12,53 8,58 C 12,62 22,60 30,50 Z" />
    </g>

    <!-- Eye (Happy smile arc) -->
    <path d="M 144,48 Q 146,50 148,48" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" />
  </g>
</svg>
