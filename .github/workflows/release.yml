name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build extension
        run: npm run build

      - name: Rename and Prepare Artifacts
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            mv better-deepseek-chrome.zip better-deepseek-chrome-latest.zip
            mv better-deepseek-firefox.zip better-deepseek-firefox-latest.zip
          else
            mv better-deepseek-chrome.zip better-deepseek-chrome-v${VERSION}.zip
            mv better-deepseek-firefox.zip better-deepseek-firefox-v${VERSION}.zip
          fi

      - name: Update Latest Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: "This release contains the latest automated build from the main branch. It is updated on every commit."
          files: |
            better-deepseek-chrome-latest.zip
            better-deepseek-firefox-latest.zip
          prerelease: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Versioned Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            better-deepseek-chrome-v*.zip
            better-deepseek-firefox-v*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
